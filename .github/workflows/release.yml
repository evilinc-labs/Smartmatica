name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Clean
        run: ./gradlew clean --no-daemon

      - name: Build all versions
        run: ./gradlew buildAndCollect --no-daemon

      - name: List build output
        run: find build/libs -name '*.jar' | sort

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$GITHUB_REF_NAME" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "$PREV_TAG".."$GITHUB_REF_NAME" -- \
              ':!*.md' ':!.github' 2>/dev/null || echo "- Initial release")
          else
            CHANGES="- Initial release"
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MOAR v${{ steps.version.outputs.version }}
          body: |
            ## MOAR v${{ steps.version.outputs.version }}

            ### Downloads
            | Minecraft | File |
            |-----------|------|
            | 1.21.1  | `moar-${{ steps.version.outputs.version }}+1.21.1.jar` |
            | 1.21.4  | `moar-${{ steps.version.outputs.version }}+1.21.4.jar` |
            | 1.21.5  | `moar-${{ steps.version.outputs.version }}+1.21.5.jar` |
            | 1.21.8  | `moar-${{ steps.version.outputs.version }}+1.21.8.jar` |
            | 1.21.10 | `moar-${{ steps.version.outputs.version }}+1.21.10.jar` |

            ### Changes
            ${{ steps.changelog.outputs.changes }}
          files: |
            build/libs/*/moar-*+1.21.1.jar
            build/libs/*/moar-*+1.21.4.jar
            build/libs/*/moar-*+1.21.5.jar
            build/libs/*/moar-*+1.21.8.jar
            build/libs/*/moar-*+1.21.10.jar
            build/libs/*/moar-*-sources.jar
          fail_on_unmatched_files: true
          generate_release_notes: false
