name: Build

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Clean & build all versions
        run: ./gradlew clean buildAndCollect --no-daemon

      - name: Upload MC 1.21.1
        uses: actions/upload-artifact@v4
        with:
          name: smartmatica-1.21.1
          path: build/libs/*/smartmatica-*+1.21.1.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload MC 1.21.4
        uses: actions/upload-artifact@v4
        with:
          name: smartmatica-1.21.4
          path: build/libs/*/smartmatica-*+1.21.4.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload MC 1.21.5
        uses: actions/upload-artifact@v4
        with:
          name: smartmatica-1.21.5
          path: build/libs/*/smartmatica-*+1.21.5.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload MC 1.21.8
        uses: actions/upload-artifact@v4
        with:
          name: smartmatica-1.21.8
          path: build/libs/*/smartmatica-*+1.21.8.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload MC 1.21.10
        uses: actions/upload-artifact@v4
        with:
          name: smartmatica-1.21.10
          path: build/libs/*/smartmatica-*+1.21.10.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload sources
        uses: actions/upload-artifact@v4
        with:
          name: smartmatica-sources
          path: build/libs/*/smartmatica-*-sources.jar
          if-no-files-found: error
          retention-days: 14
